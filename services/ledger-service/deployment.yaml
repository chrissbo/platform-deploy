# ledger-service Deployment.
#
# Image pinned by digest from the latest signed post-merge run.
# Kyverno's verify-ghcr-signatures policy checks the Cosign keyless
# signature at admission time before letting the pod start.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: ledger
  labels:
    app: ledger-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: ledger-service
          image: ghcr.io/chrissbo/ledger-service@sha256:d5c403576abd8679fd404305b76a14a3fa42ec5eaa488ab4b85f466c0fd8acd6
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
